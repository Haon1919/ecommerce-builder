name: Deploy UI Apps to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Store App
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/store
        run: npm run build --workspace=apps/store

      - name: Build Admin App
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/admin
        run: npm run build --workspace=apps/admin

      - name: Build Super Admin App
        env:
          STATIC_EXPORT: 'true'
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/super-admin
        run: npm run build --workspace=apps/super-admin

      - name: Prepare Artifacts
        run: |
          mkdir -p out/store out/admin out/super-admin
          cp -r apps/store/out/* out/store/ || true
          cp -r apps/admin/out/* out/admin/ || true
          cp -r apps/super-admin/out/* out/super-admin/ || true
          touch out/.nojekyll
          
          # Create a root index.html to navigate between them
          cat << 'EOF' > out/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <title>E-Commerce Builder Apps</title>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <style>
                  body { font-family: system-ui, -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #f9fafb; }
                  h1 { color: #111827; margin-bottom: 8px; }
                  .subtitle { color: #4b5563; margin-bottom: 32px; font-size: 1.1em; }
                  .app-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; margin-bottom: 20px; text-decoration: none; display: block; transition: all 0.2s ease; }
                  .app-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); border-color: #d1d5db; }
                  .title { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; color: #2563eb; display: flex; align-items: center; gap: 8px; }
                  .desc { color: #4b5563; }
              </style>
          </head>
          <body>
              <h1>E-Commerce Builder</h1>
              <p class="subtitle">Select an application to view its static frontend demo.</p>
              
              <a href="./store" class="app-card">
                  <div class="title">
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                      Storefront
                  </div>
                  <div class="desc">Customer-facing shopping experience.</div>
              </a>
              
              <a href="./admin" class="app-card">
                  <div class="title">
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                      Tenant Admin
                  </div>
                  <div class="desc">Dashboard for merchants to manage their specific store layout, products, and inventory.</div>
              </a>
              
              <a href="./super-admin" class="app-card">
                  <div class="title">
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                      Super Admin
                  </div>
                  <div class="desc">Platform management for all tenants, billing, and infrastructure monitoring.</div>
              </a>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy to GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options: [production, staging]
      services:
        description: Services to deploy (comma-separated, or 'all')
        required: false
        default: all

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  REGISTRY: gcr.io

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Detect which services changed (skip unchanged in PRs)
  # ─────────────────────────────────────────────────────────────
  check-secrets:
    name: Check Secrets
    runs-on: ubuntu-latest
    outputs:
      has_gcp: ${{ steps.check.outputs.has_gcp }}
    steps:
      - id: check
        run: |
          if [ "${{ secrets.GCP_SA_KEY }}" != "" ]; then
            echo "has_gcp=true" >> $GITHUB_OUTPUT
          else
            echo "has_gcp=false" >> $GITHUB_OUTPUT
          fi

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    needs: check-secrets
    outputs:
      api:         ${{ steps.filter.outputs.api }}
      admin:       ${{ steps.filter.outputs.admin }}
      store:       ${{ steps.filter.outputs.store }}
      super-admin: ${{ steps.filter.outputs.super-admin }}
      terraform:   ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            admin:
              - 'apps/admin/**'
            store:
              - 'apps/store/**'
            super-admin:
              - 'apps/super-admin/**'
            terraform:
              - 'infrastructure/terraform/**'

  # ─────────────────────────────────────────────────────────────
  # 2. Authenticate with GCP (shared step via reusable output)
  # ─────────────────────────────────────────────────────────────
  setup-gcp:
    name: Setup GCP Auth
    runs-on: ubuntu-latest
    needs: [changes, check-secrets]
    if: needs.check-secrets.outputs.has_gcp == 'true'
    permissions:
      contents: read
      id-token: write
    outputs:
      authenticated: 'true'
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

  # ─────────────────────────────────────────────────────────────
  # 3. Build & Push — API
  # ─────────────────────────────────────────────────────────────
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [changes, setup-gcp]
    if: needs.changes.outputs.api == 'true' || github.event.inputs.services == 'all' || github.event.inputs.services == 'api'
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo $GITHUB_SHA | head -c8)
          IMAGE="$REGISTRY/$PROJECT_ID/ecommerce-api:$SHA"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ecommerce-api:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ecommerce-api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/ecommerce-api:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────
  # 9. Smoke Tests (post-deploy verification)
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-api]
    if: always() && needs.deploy-api.result == 'success'
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Get service URLs
        id: urls
        run: |
          API_URL=$(gcloud run services describe ecommerce-api \
            --region="${REGION}" --project="${PROJECT_ID}" \
            --format="value(status.url)")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Health check — API
        run: |
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.urls.outputs.api_url }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✓ API health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "✗ API health check failed after $MAX_RETRIES attempts"
          exit 1

  # ─────────────────────────────────────────────────────────────
  # 10. Terraform Apply (infrastructure changes only)
  # ─────────────────────────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: infrastructure/terraform
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
          TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.TF_JWT_SECRET }}
          TF_VAR_encryption_key: ${{ secrets.TF_ENCRYPTION_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_super_admin_email: ${{ secrets.SUPER_ADMIN_EMAIL }}
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        working-directory: infrastructure/terraform
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
          TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.TF_JWT_SECRET }}
          TF_VAR_encryption_key: ${{ secrets.TF_ENCRYPTION_KEY }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_super_admin_email: ${{ secrets.SUPER_ADMIN_EMAIL }}
        run: terraform apply -input=false tfplan

  # ─────────────────────────────────────────────────────────────
  # 11. Notify on failure
  # ─────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: failure()
    steps:
      - name: Post failure summary
        run: |
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more deployment steps failed. Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** $GITHUB_ACTOR" >> $GITHUB_STEP_SUMMARY
